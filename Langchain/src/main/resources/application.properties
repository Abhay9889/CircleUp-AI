spring.application.name=Langchain

# =====================================================
# DOCKER COMPOSE
# Set to false ? Spring Boot will NOT manage Docker.
# Start Docker manually before running the app:
#   cd educircle && docker-compose up -d
# =====================================================
spring.docker.compose.enabled=false

# =====================================================
# DATABASE ? PICK ONE OPTION, COMMENT THE OTHERS
# =====================================================

# ----------------------------------------------------
# OPTION 1 (ACTIVE): DOCKER POSTGRES
# Requires: docker-compose up -d (postgres container)
# pgAdmin settings to connect:
#   Host: localhost  Port: 5432
#   Database: mydatabase  User: educircle  Pass: root
# ----------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.webflux.client.read-timeout=180000
# ----------------------------------------------------
# OPTION 2: NATIVE PGADMIN (no Docker needed)
# Install PostgreSQL on your machine, then create
# a database named "educircle" in pgAdmin manually.
# Change password to whatever you set during install.
# pgAdmin settings:
#   Host: localhost  Port: 5432
#   Database: educircle  User: postgres  Pass: postgres
# ----------------------------------------------------
#spring.datasource.url=jdbc:postgresql://localhost:5432/educircle
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------------------------------
# OPTION 3: SUPABASE (cloud database)
# Get your URL from: Supabase Dashboard
#   ? Project Settings ? Database ? Connection string
# Use the "Session mode" URI (port 5432, not 6543)
# ----------------------------------------------------
#spring.datasource.url=jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres
#spring.datasource.username=postgres.pnqowmrtsgyxblgthqix
#spring.datasource.password=1045Aditya@
#spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# CONNECTION POOL (Hikari)
# =====================================================
spring.datasource.hikari.pool-name=EduCirclePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =====================================================
# FLYWAY ? off (Hibernate ddl-auto handles schema)
# =====================================================
spring.flyway.enabled=false

# =====================================================
# JWT
# =====================================================
app.jwt.secret=circleup-super-secure-secret-key-2026
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiry-ms=86400000

# =====================================================
# MINIO
# =====================================================
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-notes=notes
minio.bucket-profile=profiles

# =====================================================
# AI SERVICE (FastAPI)
# =====================================================
ai-service.base-url=http://localhost:8000
ai-service.timeout-seconds=180

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# =====================================================
# LOGGING
# =====================================================
logging.level.com.EduCircle=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN


